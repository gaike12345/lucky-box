<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸运盲盒 · 抽奖系统</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix@0.0.1/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 12px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
        
        /* 头部 */
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; color: white; text-align: center; }
        .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }
        .header-actions { margin-top: 12px; display: flex; gap: 8px; justify-content: center; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .header-btn:hover { background: rgba(255,255,255,0.3); }
        .header-btn.active { background: white; color: #667eea; }
        
        /* API 状态 */
        .api-status { padding: 8px 16px; background: #f0f9ff; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .api-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
        .api-status .dot.offline { background: #ef4444; }
        
        /* 内容区域 */
        .content { padding: 16px; min-height: 400px; }
        
        /* 用户面板 */
        .user-panel { text-align: center; }
        .user-info-card { background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 16px; padding: 16px; color: white; margin-bottom: 16px; }
        .user-info-card .phone { font-size: 1.1rem; margin-bottom: 4px; }
        .user-info-card .tickets { font-size: 2rem; font-weight: bold; }
        .user-info-card .label { font-size: 0.75rem; opacity: 0.9; }
        
        /* 抽奖区域 */
        .draw-area { background: #fef3f2; border-radius: 20px; padding: 24px; margin-bottom: 16px; }
        .prize-display { background: white; border-radius: 16px; padding: 32px; margin-bottom: 16px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .prize-display .icon { font-size: 4rem; transition: transform 0.1s; }
        .prize-display.rolling .icon { animation: shake 0.1s infinite; }
        @keyframes shake { 0%, 100% { transform: scale(1) rotate(0); } 50% { transform: scale(1.1) rotate(5deg); } }
        .prize-display .name { font-size: 1.2rem; font-weight: bold; color: #764ba2; margin-top: 12px; }
        .draw-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; padding: 16px 48px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .draw-btn:hover:not(:disabled) { transform: scale(1.02); }
        .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .draw-hint { font-size: 0.8rem; color: #888; margin-top: 12px; }
        
        /* 历史记录 */
        .history-section { margin-top: 16px; }
        .section-title { font-size: 0.9rem; font-weight: bold; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .history-list { max-height: 200px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #f8fafc; border-radius: 12px; margin-bottom: 8px; }
        .history-item .icon { font-size: 1.5rem; }
        .history-item .info { flex: 1; }
        .history-item .name { font-weight: 600; font-size: 0.85rem; }
        .history-item .time { font-size: 0.7rem; color: #888; }
        
        /* 管理员面板 */
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        .admin-section { background: #f8fafc; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .admin-section h3 { font-size: 0.9rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .admin-btn { padding: 8px 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; margin: 4px; font-size: 0.8rem; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-danger { background: #fecaca; color: #dc2626; }
        .btn-success { background: #bbf7d0; color: #16a34a; }
        
        /* 奖品表格 */
        .prize-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .prize-table th, .prize-table td { padding: 8px 4px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .prize-table th { background: #667eea; color: white; }
        .prize-table input { width: 100%; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.75rem; }
        
        /* 输入框 */
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-group input { flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.85rem; }
        .input-group input:focus { outline: none; border-color: #667eea; }
        
        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .stat-card { background: white; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-card .value { font-size: 1.3rem; font-weight: bold; color: #667eea; }
        .stat-card .label { font-size: 0.7rem; color: #888; }
        
        /* 二维码区域 */
        .qr-section { text-align: center; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; padding: 16px; color: white; }
        .qr-section h4 { margin-bottom: 8px; }
        #qrcode { display: inline-block; background: white; padding: 8px; border-radius: 12px; }
        .qr-link { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 8px 16px; margin-top: 12px; font-size: 0.75rem; word-break: break-all; }
        
        /* 登录弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 16px; }
        .modal.show { display: flex; }
        .modal-card { background: white; border-radius: 24px; padding: 24px; width: 100%; max-width: 360px; text-align: center; }
        .modal-card h3 { margin-bottom: 16px; }
        .modal-card input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 24px; font-size: 1rem; margin-bottom: 12px; text-align: center; }
        .modal-card input:focus { border-color: #667eea; outline: none; }
        .modal-card .btn { width: 100%; padding: 12px; border-radius: 24px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .modal-card .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .modal-card .btn-secondary { background: #f1f5f9; color: #64748b; margin-top: 8px; }
        .modal-card .hint { font-size: 0.75rem; color: #888; margin-top: 12px; }
        
        /* 中奖弹窗 */
        .win-modal .prize-icon { font-size: 5rem; margin: 16px 0; }
        .win-modal .prize-name { font-size: 1.5rem; font-weight: bold; color: #667eea; margin-bottom: 16px; }
        
        /* Toast */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 24px; font-size: 0.85rem; z-index: 2000; }
        
        /* 用户模式隐藏管理面板 */
        body.user-mode .admin-only { display: none !important; }
        
        /* 加载动画 */
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>🎰 幸运盲盒</h1>
        <p>扫码参与抽奖，赢取惊喜大奖！</p>
        <div class="header-actions">
            <button class="header-btn active" id="userModeBtn" onclick="switchMode('user')">🎲 用户抽奖</button>
            <button class="header-btn" id="adminModeBtn" onclick="switchMode('admin')">⚙️ 管理后台</button>
        </div>
    </div>
    
    <!-- API 状态 -->
    <div class="api-status">
        <span class="dot" id="statusDot"></span>
        <span>API: <span id="statusText">检测中...</span></span>
    </div>
    
    <!-- 内容区域 -->
    <div class="content">
        <!-- 用户抽奖面板 -->
        <div class="user-panel" id="userPanel">
            <!-- 未登录状态 -->
            <div id="notLoggedIn">
                <div style="text-align:center;padding:40px 20px;">
                    <div style="font-size:4rem;margin-bottom:16px;">🎁</div>
                    <h3 style="margin-bottom:8px;">欢迎来到幸运盲盒</h3>
                    <p style="color:#888;font-size:0.85rem;margin-bottom:24px;">登录后即可参与抽奖</p>
                    <button class="draw-btn" onclick="showLoginModal()">立即登录</button>
                </div>
            </div>
            
            <!-- 已登录状态 -->
            <div id="loggedIn" style="display:none;">
                <!-- 用户信息卡片 -->
                <div class="user-info-card">
                    <div class="label">当前账号</div>
                    <div class="phone" id="displayPhone">-</div>
                    <div class="tickets" id="displayTickets">0</div>
                    <div class="label">张抽奖券</div>
                </div>
                
                <!-- 抽奖区域 -->
                <div class="draw-area">
                    <div class="prize-display" id="prizeDisplay">
                        <div class="icon">🎁</div>
                        <div class="name">点击下方按钮抽奖</div>
                    </div>
                    <button class="draw-btn" id="drawBtn" onclick="performDraw()">✨ 开始抽奖 ✨</button>
                    <div class="draw-hint" id="drawHint">每次抽奖消耗1张券</div>
                </div>
                
                <!-- 抽奖记录 -->
                <div class="history-section">
                    <div class="section-title"><i class="fas fa-history"></i> 我的抽奖记录</div>
                    <div class="history-list" id="historyList">
                        <div style="text-align:center;color:#888;padding:20px;font-size:0.85rem;">暂无记录</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 管理员面板 -->
        <div class="admin-panel" id="adminPanel">
            <!-- 统计数据 -->
            <div class="admin-section">
                <h3><i class="fas fa-chart-bar"></i> 数据统计</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="value" id="statUsers">0</div>
                        <div class="label">用户数</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="statDraws">0</div>
                        <div class="label">抽奖次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="statTickets">0</div>
                        <div class="label">剩余券数</div>
                    </div>
                </div>
                <button class="admin-btn btn-secondary" onclick="refreshStats()"><i class="fas fa-sync"></i> 刷新</button>
                <button class="admin-btn btn-success" onclick="exportData()"><i class="fas fa-download"></i> 导出数据</button>
            </div>
            
            <!-- 奖品管理 -->
            <div class="admin-section admin-only">
                <h3><i class="fas fa-gift"></i> 奖品配置</h3>
                <div style="max-height:200px;overflow-y:auto;">
                    <table class="prize-table">
                        <thead><tr><th>图标</th><th>奖品名</th><th>权重</th><th>操作</th></tr></thead>
                        <tbody id="prizeTableBody"></tbody>
                    </table>
                </div>
                <button class="admin-btn btn-secondary" onclick="addPrize()" style="margin-top:8px;">+ 添加奖品</button>
                <button class="admin-btn btn-secondary" onclick="resetPrizes()">重置默认</button>
            </div>
            
            <!-- 抽奖券管理 -->
            <div class="admin-section admin-only">
                <h3><i class="fas fa-ticket-alt"></i> 抽奖券管理</h3>
                <div class="input-group">
                    <input type="tel" id="inputPhone" placeholder="输入手机号" maxlength="11">
                    <button class="admin-btn btn-primary" onclick="queryUser()">查询</button>
                </div>
                <div id="queryResult" style="background:white;border-radius:12px;padding:12px;margin-bottom:12px;display:none;">
                    <div style="font-size:0.8rem;"><strong>手机号:</strong> <span id="resultPhone"></span></div>
                    <div style="font-size:0.8rem;"><strong>抽奖券:</strong> <span id="resultTickets"></span> 张</div>
                </div>
                <div class="input-group">
                    <input type="number" id="inputAmount" placeholder="数量" value="1" min="1" style="width:80px;flex:none;">
                    <button class="admin-btn btn-success" onclick="addTickets()">➕ 发放</button>
                    <button class="admin-btn btn-danger" onclick="reduceTickets()">➖ 扣减</button>
                </div>
                <button class="admin-btn btn-primary" onclick="batchAddTickets()">🎁 为所有用户 +1 券</button>
            </div>
            
            <!-- 二维码 -->
            <div class="qr-section admin-only">
                <h4>📱 扫码参与抽奖</h4>
                <div id="qrcode"></div>
                <div class="qr-link" id="qrLink">点击下方按钮生成</div>
                <div style="margin-top:12px;">
                    <button class="admin-btn btn-secondary" style="background:rgba(255,255,255,0.2);color:white;" onclick="generateQRCode()">生成二维码</button>
                    <button class="admin-btn btn-secondary" style="background:rgba(255,255,255,0.2);color:white;" onclick="copyLink()">复制链接</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 用户登录弹窗 -->
<div class="modal" id="loginModal">
    <div class="modal-card">
        <h3>📱 手机号登录</h3>
        <input type="tel" id="loginPhone" placeholder="请输入11位手机号" maxlength="11">
        <button class="btn btn-primary" onclick="userLogin()">登录参与抽奖</button>
        <button class="btn btn-secondary" onclick="closeModal('loginModal')">取消</button>
        <div class="hint">新用户登录后抽奖券为0，请联系管理员领取</div>
    </div>
</div>

<!-- 管理员登录弹窗 -->
<div class="modal" id="adminLoginModal">
    <div class="modal-card">
        <h3>🔐 管理员登录</h3>
        <input type="password" id="adminPassword" placeholder="请输入管理员密码">
        <button class="btn btn-primary" onclick="adminLogin()">登录</button>
        <button class="btn btn-secondary" onclick="closeModal('adminLoginModal')">取消</button>
    </div>
</div>

<!-- 中奖弹窗 -->
<div class="modal win-modal" id="winModal">
    <div class="modal-card">
        <div style="font-size:1.2rem;font-weight:bold;">🎉 恭喜中奖 🎉</div>
        <div class="prize-icon" id="winIcon">🏆</div>
        <div class="prize-name" id="winName">大奖</div>
        <button class="btn btn-primary" onclick="closeModal('winModal')">太棒了！</button>
    </div>
</div>

<script>
// ==================== 配置 ====================
const API_BASE_URL = 'https://api.gaike.xyz';
let currentUser = null;
let currentMode = 'user';
let isAdminLoggedIn = false;
let prizes = [];
let currentQueryPhone = '';

// ==================== API 请求 ====================
async function api(endpoint, method = 'GET', data = null) {
    try {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (data && (method === 'POST' || method === 'PUT')) opts.body = JSON.stringify(data);
        const res = await fetch(API_BASE_URL + endpoint, opts);
        return await res.json();
    } catch (e) {
        console.error('API Error:', e);
        return { success: false, message: '网络连接失败' };
    }
}

// ==================== 初始化 ====================
async function init() {
    await checkAPIStatus();
    
    // 检查登录状态
    const saved = sessionStorage.getItem('manghe_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        showLoggedIn();
        loadUserRecords();
    }
    
    // 加载奖品
    await loadPrizes();
}

async function checkAPIStatus() {
    const res = await api('/');
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (res.success !== false) {
        dot.classList.remove('offline');
        text.textContent = '在线 v' + (res.version || '2.0');
    } else {
        dot.classList.add('offline');
        text.textContent = '离线';
    }
}

// ==================== 模式切换 ====================
function switchMode(mode) {
    currentMode = mode;
    document.getElementById('userModeBtn').classList.toggle('active', mode === 'user');
    document.getElementById('adminModeBtn').classList.toggle('active', mode === 'admin');
    document.getElementById('userPanel').style.display = mode === 'user' ? 'block' : 'none';
    document.getElementById('adminPanel').classList.toggle('active', mode === 'admin');
    
    if (mode === 'admin') {
        if (!isAdminLoggedIn) {
            showModal('adminLoginModal');
        } else {
            refreshStats();
        }
    }
}

// ==================== 用户功能 ====================
function showLoginModal() {
    showModal('loginModal');
}

async function userLogin() {
    const phone = document.getElementById('loginPhone').value.trim();
    if (!phone || phone.length !== 11 || !phone.startsWith('1')) {
        showToast('请输入正确的11位手机号');
        return;
    }
    
    const res = await api('/api/login', 'POST', { phone });
    if (res.success) {
        currentUser = { phone, tickets: res.user.tickets };
        sessionStorage.setItem('manghe_user', JSON.stringify(currentUser));
        closeModal('loginModal');
        showLoggedIn();
        showToast('登录成功！');
        loadUserRecords();
    } else {
        showToast(res.message || '登录失败');
    }
}

function showLoggedIn() {
    document.getElementById('notLoggedIn').style.display = 'none';
    document.getElementById('loggedIn').style.display = 'block';
    document.getElementById('displayPhone').textContent = currentUser.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
    updateTicketsDisplay();
}

function updateTicketsDisplay() {
    document.getElementById('displayTickets').textContent = currentUser.tickets;
    document.getElementById('drawBtn').disabled = currentUser.tickets <= 0;
    document.getElementById('drawHint').textContent = currentUser.tickets <= 0 
        ? '抽奖券不足，请联系管理员领取' 
        : `每次抽奖消耗1张券，当前剩余 ${currentUser.tickets} 张`;
}

async function loadUserRecords() {
    if (!currentUser) return;
    const res = await api('/api/records/' + currentUser.phone + '?limit=10');
    if (res.success && res.records.length > 0) {
        const list = document.getElementById('historyList');
        list.innerHTML = res.records.map(r => `
            <div class="history-item">
                <div class="icon">${r.prize.icon}</div>
                <div class="info">
                    <div class="name">${r.prize.name}</div>
                    <div class="time">${new Date(r.time).toLocaleString()}</div>
                </div>
            </div>
        `).join('');
    }
}

async function performDraw() {
    if (!currentUser) {
        showLoginModal();
        return;
    }
    
    if (currentUser.tickets <= 0) {
        showToast('抽奖券不足');
        return;
    }
    
    // 开始动画
    const display = document.getElementById('prizeDisplay');
    display.classList.add('rolling');
    document.getElementById('drawBtn').disabled = true;
    
    // 调用API
    const res = await api('/api/draw', 'POST', { phone: currentUser.phone });
    
    // 停止动画并显示结果
    display.classList.remove('rolling');
    
    if (res.success) {
        const prize = res.prize;
        currentUser.tickets = res.tickets_left;
        updateTicketsDisplay();
        
        // 显示中奖结果
        display.innerHTML = `
            <div class="icon">${prize.icon}</div>
            <div class="name">${prize.name}</div>
        `;
        
        // 显示中奖弹窗
        document.getElementById('winIcon').textContent = prize.icon;
        document.getElementById('winName').textContent = prize.name;
        showModal('winModal');
        
        // 刷新记录
        loadUserRecords();
    } else {
        showToast(res.message || '抽奖失败');
        document.getElementById('drawBtn').disabled = currentUser.tickets <= 0;
    }
}

function logout() {
    currentUser = null;
    sessionStorage.removeItem('manghe_user');
    document.getElementById('notLoggedIn').style.display = 'block';
    document.getElementById('loggedIn').style.display = 'none';
    showToast('已退出登录');
}

// ==================== 管理员功能 ====================
async function adminLogin() {
    const pwd = document.getElementById('adminPassword').value;
    const res = await api('/api/admin/login', 'POST', { password: pwd });
    
    if (res.success) {
        isAdminLoggedIn = true;
        closeModal('adminLoginModal');
        refreshStats();
        loadPrizes();
        showToast('管理员登录成功');
    } else {
        showToast('密码错误');
    }
}

async function refreshStats() {
    const res = await api('/api/admin/stats');
    if (res.success) {
        document.getElementById('statUsers').textContent = res.stats.total_users;
        document.getElementById('statDraws').textContent = res.stats.total_draws;
        document.getElementById('statTickets').textContent = res.stats.total_tickets;
    }
}

async function loadPrizes() {
    const res = await api('/api/prizes');
    if (res.success) {
        prizes = res.prizes;
        renderPrizeTable();
    }
}

function renderPrizeTable() {
    const tbody = document.getElementById('prizeTableBody');
    tbody.innerHTML = prizes.map((p, i) => `
        <tr>
            <td><span style="font-size:1.2rem;cursor:pointer" onclick="selectIcon(${i})">${p.icon}</span></td>
            <td><input type="text" value="${p.name}" onchange="updatePrize(${i}, 'name', this.value)"></td>
            <td><input type="number" value="${p.weight}" onchange="updatePrize(${i}, 'weight', this.value)" style="width:50px"></td>
            <td><button class="admin-btn btn-danger" onclick="removePrize(${i})">删除</button></td>
        </tr>
    `).join('');
}

async function updatePrize(index, field, value) {
    prizes[index][field] = field === 'weight' ? parseInt(value) || 0 : value;
    await api('/api/admin/prizes', 'POST', { prizes });
}

function addPrize() {
    prizes.push({ id: Date.now().toString(), name: "新奖品", weight: 10, icon: "🎁", stock: -1 });
    renderPrizeTable();
    api('/api/admin/prizes', 'POST', { prizes });
}

async function removePrize(index) {
    if (prizes.length <= 1) {
        showToast('至少保留一个奖品');
        return;
    }
    prizes.splice(index, 1);
    renderPrizeTable();
    await api('/api/admin/prizes', 'POST', { prizes });
    showToast('已删除');
}

async function resetPrizes() {
    prizes = [
        { id: "1", name: "🏆 黄金大奖", weight: 5, icon: "🏆", stock: -1 },
        { id: "2", name: "🎧 高端耳机", weight: 10, icon: "🎧", stock: -1 },
        { id: "3", name: "🍫 巧克力礼盒", weight: 20, icon: "🍫", stock: -1 },
        { id: "4", name: "🧸 毛绒公仔", weight: 30, icon: "🧸", stock: -1 },
        { id: "5", name: "💝 幸运券", weight: 35, icon: "💝", stock: -1 },
        { id: "6", name: "😢 谢谢参与", weight: 100, icon: "😢", stock: -1 }
    ];
    renderPrizeTable();
    await api('/api/admin/prizes', 'POST', { prizes });
    showToast('已重置为默认奖品');
}

async function queryUser() {
    const phone = document.getElementById('inputPhone').value.trim();
    if (!phone || phone.length !== 11) {
        showToast('请输入正确的手机号');
        return;
    }
    currentQueryPhone = phone;
    const res = await api('/api/user/' + phone);
    const resultDiv = document.getElementById('queryResult');
    resultDiv.style.display = 'block';
    
    if (res.success) {
        document.getElementById('resultPhone').textContent = res.user.phone;
        document.getElementById('resultTickets').textContent = res.user.tickets;
    } else {
        document.getElementById('resultPhone').textContent = phone;
        document.getElementById('resultTickets').textContent = '0 (用户未注册)';
    }
}

async function addTickets() {
    if (!currentQueryPhone) {
        showToast('请先查询用户');
        return;
    }
    const amount = parseInt(document.getElementById('inputAmount').value) || 1;
    const res = await api('/api/admin/tickets/add', 'POST', { phone: currentQueryPhone, count: amount });
    if (res.success) {
        showToast(`已发放 ${amount} 张券`);
        queryUser();
        refreshStats();
    } else {
        showToast(res.message || '操作失败');
    }
}

async function reduceTickets() {
    if (!currentQueryPhone) {
        showToast('请先查询用户');
        return;
    }
    const amount = -(parseInt(document.getElementById('inputAmount').value) || 1);
    const res = await api('/api/admin/tickets/add', 'POST', { phone: currentQueryPhone, count: amount });
    if (res.success) {
        showToast(`已扣减 ${-amount} 张券`);
        queryUser();
        refreshStats();
    } else {
        showToast(res.message || '操作失败');
    }
}

async function batchAddTickets() {
    if (!confirm('确定为所有用户发放1张抽奖券？')) return;
    const res = await api('/api/admin/tickets/batch', 'POST', { count: 1 });
    if (res.success) {
        showToast(`已为 ${res.user_count} 位用户发放抽奖券`);
        refreshStats();
    } else {
        showToast(res.message || '操作失败');
    }
}

async function exportData() {
    const res = await api('/api/admin/export');
    if (!res.success) {
        showToast('导出失败');
        return;
    }
    
    const users = Object.entries(res.data.users || {}).map(([phone, data]) => ({
        手机号: phone,
        抽奖券: data.tickets || 0,
        注册时间: data.created_at || ''
    }));
    
    if (!users.length) {
        showToast('暂无数据');
        return;
    }
    
    const ws = XLSX.utils.json_to_sheet(users);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '用户数据');
    XLSX.writeFile(wb, `盲盒数据_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast(`已导出 ${users.length} 条记录`);
}

function generateQRCode() {
    const link = window.location.origin + window.location.pathname;
    document.getElementById('qrLink').textContent = link;
    
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
    new QRCode('qrcode', { text: link, width: 120, height: 120 });
    showToast('二维码已生成');
}

function copyLink() {
    const link = document.getElementById('qrLink').textContent || window.location.href;
    navigator.clipboard.writeText(link).then(() => {
        showToast('链接已复制');
    });
}

// ==================== 工具函数 ====================
function showModal(id) {
    document.getElementById(id).classList.add('show');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('show');
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// 点击模态框外部关闭
document.querySelectorAll('.modal').forEach(modal => {
    modal.addEventListener('click', e => {
        if (e.target === modal) closeModal(modal.id);
    });
});

// 启动
init();
</script>
</body>
</html>
