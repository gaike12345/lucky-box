<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运盲盒 · 抽奖券系统</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix@0.0.1/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 16px; }
        .app-container { max-width: 1400px; margin: 0 auto; background: rgba(255,255,255,0.96); border-radius: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); overflow: hidden; }
        .dashboard { display: flex; flex-wrap: wrap; }
        .admin-panel { flex: 1; min-width: 380px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        .lottery-panel { flex: 1.5; padding: 32px; background: linear-gradient(145deg, #fffaf5 0%, #fff1f5 100%); display: flex; flex-direction: column; align-items: center; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 3000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; border-radius: 40px; padding: 36px; width: 90%; max-width: 400px; text-align: center; }
        .phone-input { width: 100%; padding: 14px; font-size: 1rem; border: 2px solid #e2e8ff; border-radius: 40px; margin-bottom: 16px; text-align: center; }
        .phone-input:focus { border-color: #667eea; outline: none; }
        .login-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 14px; border-radius: 40px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; }
        .prize-marquee { width: 100%; background: rgba(255,245,235,0.95); border-radius: 60px; padding: 12px; margin-bottom: 24px; overflow: hidden; }
        .marquee-track { display: flex; gap: 20px; animation: scroll 22s linear infinite; width: max-content; }
        .marquee-item { background: white; padding: 8px 16px; border-radius: 40px; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 80px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-48%); } }
        .lottery-box { text-align: center; width: 100%; max-width: 500px; }
        .user-info { background: rgba(102,126,234,0.12); border-radius: 40px; padding: 8px 16px; margin-bottom: 16px; display: inline-block; color: #5a67d8; }
        .remain-chances { font-size: 1.2rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; display: inline-block; padding: 10px 28px; border-radius: 40px; margin-bottom: 20px; font-weight: 700; }
        .rolling-container { background: white; border-radius: 40px; padding: 28px; margin: 16px 0; box-shadow: 0 15px 30px rgba(0,0,0,0.1); cursor: pointer; }
        .rolling-display { background: #fef9f0; border-radius: 32px; padding: 24px; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .rolling-icon { font-size: 4rem; }
        .rolling-name { font-size: 1.3rem; font-weight: 800; margin-top: 14px; color: #764ba2; }
        .rolling-active .rolling-icon { animation: pulseShake 0.12s infinite; }
        @keyframes pulseShake { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08) rotate(3deg); } }
        .draw-button { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; padding: 14px 40px; border-radius: 40px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin: 16px 0; width: 80%; }
        .draw-button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-area { background: rgba(255,248,240,0.95); border-radius: 32px; padding: 16px; min-height: 70px; }
        .prize-table-container { background: #fafbff; border-radius: 20px; padding: 8px; margin-bottom: 16px; max-height: 300px; overflow-y: auto; }
        .prize-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .prize-table th { background: linear-gradient(135deg, #667eea, #7c5fc0); padding: 10px 6px; color: white; }
        .prize-table td { padding: 8px 6px; border-bottom: 1px solid #eef2ff; }
        .btn-primary, .btn-secondary, .btn-danger, .btn-success { padding: 8px 14px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; margin: 4px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #eef2ff; color: #4c51bf; }
        .btn-danger { background: #ff8787; color: white; }
        .btn-success { background: #69db7e; color: #2c3e2f; }
        .qrcode-container { background: linear-gradient(145deg, #5f6fdf, #8b5bb4); border-radius: 24px; padding: 16px; text-align: center; margin-top: 20px; }
        .qrcode-content { background: white; border-radius: 20px; padding: 14px; margin: 10px 0; display: flex; justify-content: center; align-items: center; min-height: 180px; }
        #qrcode { display: flex; justify-content: center; align-items: center; width: 160px; height: 160px; }
        #qrcode img, #qrcode canvas { width: 160px !important; height: 160px !important; border-radius: 12px; }
        .share-link { background: rgba(0,0,0,0.3); border-radius: 30px; padding: 10px; font-size: 0.7rem; word-break: break-all; color: white; margin: 8px 0; cursor: pointer; }
        .api-status { background: #e3f2fd; border-radius: 16px; padding: 8px; margin-bottom: 12px; font-size: 0.75rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 32px; max-width: 450px; width: 90%; padding: 24px; }
        .modal-close { position: absolute; top: 16px; right: 20px; font-size: 1.4rem; cursor: pointer; }
        .toast-notification { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293bdd; color: white; padding: 12px 24px; border-radius: 40px; z-index: 4000; font-size: 0.9rem; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 800px) { .admin-panel { min-width: 100%; } .lottery-panel { min-width: 100%; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="dashboard">
        <div class="admin-panel" id="adminPanel">
            <h3 style="margin-bottom: 16px;">🎫 盲盒管理后台 <span style="background:#667eea;color:white;padding:4px 10px;border-radius:20px;font-size:0.7rem;">管理员</span></h3>
            <div class="api-status"><i class="fas fa-cloud"></i> API状态: <span id="apiStatusText">检测中...</span></div>
            <div style="background:#f0f3ff;border-radius:20px;padding:12px;margin-bottom:16px;">
                <div><strong>📊 数据管理</strong></div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;">
                    <button class="btn-primary" id="exportExcelBtn"><i class="fas fa-file-excel"></i> 导出</button>
                    <button class="btn-secondary" id="refreshStatsBtn"><i class="fas fa-sync"></i> 刷新统计</button>
                </div>
                <div id="statsDisplay" style="background:white;border-radius:12px;padding:8px;font-size:0.75rem;"></div>
            </div>
            <div class="prize-table-container">
                <table class="prize-table"><thead><tr><th>图示</th><th>奖品</th><th>权重</th><th>操作</th></tr></thead><tbody id="prizeTableBody"></tbody></table>
            </div>
            <button class="btn-secondary" id="addPrizeBtn" style="width:100%;margin-bottom:12px;">+ 添加奖品</button>
            <div style="background:#f0f3ff;border-radius:20px;padding:12px;margin-bottom:12px;">
                <div><strong>🎟️ 抽奖券管理</strong></div>
                <div style="display:flex;gap:8px;margin:10px 0;">
                    <input type="tel" id="searchPhone" placeholder="手机号" style="flex:1;padding:8px;border-radius:30px;border:1px solid #ccc;">
                    <button class="btn-secondary" id="searchUserBtn">🔍</button>
                </div>
                <div id="userPhoneInfo" style="background:white;border-radius:16px;padding:8px;font-size:0.7rem;display:none;"></div>
                <div style="display:flex;gap:8px;margin-top:10px;">
                    <input type="number" id="addChanceAmount" value="1" min="1" style="width:60px;padding:6px;border-radius:30px;">
                    <button class="btn-primary" id="addUserChanceBtn">➕发放</button>
                    <button class="btn-danger" id="resetUserChanceBtn">清空</button>
                </div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
                <button class="btn-primary" id="saveConfigBtn">💾 保存配置</button>
                <button class="btn-secondary" id="resetDefaultBtn">🔄 重置</button>
                <button class="btn-success" id="batchAddTicketsBtn">🎁批量+1</button>
            </div>
            <div class="qrcode-container">
                <h4 style="color:white;"><i class="fas fa-ticket-alt"></i> 幸运盲盒抽奖</h4>
                <div class="qrcode-content"><div id="qrcode"></div></div>
                <div class="share-link" id="shareLinkDisplay">点击「保存配置」生成二维码</div>
                <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;">
                    <button class="btn-secondary" id="copyLinkBtn" style="background:rgba(255,255,255,0.2);color:white;">📋 复制</button>
                    <button class="btn-secondary" id="downloadQrBtn" style="background:rgba(255,255,255,0.2);color:white;">💾 保存</button>
                </div>
            </div>
        </div>
        <div class="lottery-panel" id="lotteryPanel" style="display:none;">
            <div class="prize-marquee"><div class="marquee-track" id="marqueeTrack"></div></div>
            <div class="lottery-box">
                <div class="user-info" id="userPhoneDisplay"><i class="fas fa-mobile-alt"></i> 未登录</div>
                <div class="remain-chances" id="remainChances">🎫 券: 0</div>
                <div class="rolling-container" id="rollingContainer">
                    <div class="rolling-display" id="rollingDisplay">
                        <div class="rolling-icon" id="rollingIcon">🎁</div>
                        <div class="rolling-name" id="rollingName">请先登录</div>
                    </div>
                </div>
                <button class="draw-button" id="drawBtn" disabled>✨ 抽奖 ✨</button>
                <div class="result-area" id="resultArea">💎 登录后参与抽奖</div>
            </div>
        </div>
    </div>
</div>

<div id="loginModal" class="login-overlay" style="display:none;">
    <div class="login-card">
        <div style="font-size:3rem;">📱</div>
        <div style="font-size:1.2rem;font-weight:bold;margin:12px 0;">手机号登录</div>
        <input type="tel" id="loginPhone" class="phone-input" placeholder="请输入11位手机号" maxlength="11">
        <button class="login-btn" id="submitLoginBtn">登录参与抽奖</button>
        <div style="font-size:0.75rem;color:#888;margin-top:12px;">新用户券为0，请联系管理员领取</div>
    </div>
</div>

<div id="winModal" class="modal">
    <div style="background:white;border-radius:40px;max-width:380px;width:90%;padding:32px;text-align:center;">
        <div id="winIcon" style="font-size:4rem;">🏆</div>
        <div style="font-size:1.6rem;font-weight:bold;margin:12px 0;">🎉 恭喜中奖 🎉</div>
        <div id="winPrizeName" style="font-size:1.3rem;color:#667eea;margin-bottom:16px;"></div>
        <button class="btn-primary" id="closeWinModalBtn" style="width:100%;">收下惊喜</button>
    </div>
</div>

<div id="iconModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" id="closeIconModal">&times;</span>
        <h4>🎨 选择图标</h4>
        <div id="iconGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:16px;max-height:300px;overflow-y:auto;"></div>
    </div>
</div>

<script>
// ==================== 后端 API 配置 ====================
const API_BASE_URL = 'https://api.gaike.xyz';

async function apiRequest(endpoint, method = 'GET', data = null) {
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (data && (method === 'POST' || method === 'PUT')) options.body = JSON.stringify(data);
    try {
        const response = await fetch(API_BASE_URL + endpoint, options);
        return await response.json();
    } catch (error) {
        console.error('API Error:', error);
        return { success: false, message: '网络请求失败' };
    }
}

async function checkApiStatus() {
    try {
        const result = await apiRequest('/');
        const el = document.getElementById('apiStatusText');
        if (result && result.message) {
            el.innerHTML = '<span style="color:green;">✅在线</span> v' + result.version;
            return true;
        }
        el.innerHTML = '<span style="color:red;">❌离线</span>';
        return false;
    } catch (e) {
        document.getElementById('apiStatusText').innerHTML = '<span style="color:red;">❌失败</span>';
        return false;
    }
}

// ==================== 全局变量 ====================
const ICON_LIBRARY = ["🎁","🎉","🏆","💎","👑","🍫","🍭","🧸","📱","💻","🎧","📷","⌚","💄","👟","🧢","✈️","🚗","🏠","🐱","🐶","🌸","⭐","🔥","💰","🔮","🎮","📚","⚽","🏀","🥇","🎨","🍪","🍬","🍷","💍","💡","🌈","💝","💖","🎵","🎶","🔔","🎤","✨","🌟","💫","🍀","🎯"];
const DEFAULT_PRIZES = [
    { name: "🏆 黄金大奖", weight: 5, iconValue: "🏆" },
    { name: "🎧 高端耳机", weight: 10, iconValue: "🎧" },
    { name: "🍫 巧克力礼盒", weight: 20, iconValue: "🍫" },
    { name: "🧸 毛绒公仔", weight: 30, iconValue: "🧸" },
    { name: "💝 幸运券", weight: 35, iconValue: "💝" },
    { name: "😢 谢谢参与", weight: 100, iconValue: "😢" }
];

let prizeList = [], currentUser = null, isRolling = false, rollInterval = null;
let activeEditIdx = null, currentSearchPhone = '', currentShareLink = '', isUserMode = false;

// ==================== 工具函数 ====================
function showToast(msg, duration = 2500) {
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
}

function escapeHtml(str) {
    return str ? str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]) : '';
}

// ==================== 用户相关 ====================
async function userLogin(phone) {
    if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showToast('请输入正确的11位手机号'); return false; }
    const btn = document.getElementById('submitLoginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> 登录中';
    
    const result = await apiRequest('/api/login', 'POST', { phone });
    btn.disabled = false;
    btn.innerText = '登录参与抽奖';
    
    if (result.success) {
        currentUser = { phone, tickets: result.user.tickets || 0 };
        sessionStorage.setItem('session', JSON.stringify(currentUser));
        updateUIAfterLogin();
        showToast(`登录成功，抽奖券: ${currentUser.tickets}`);
        return true;
    }
    showToast(result.message || '登录失败');
    return false;
}

function updateUIAfterLogin() {
    if (!currentUser) return;
    document.getElementById('userPhoneDisplay').innerHTML = `<i class="fas fa-mobile-alt"></i> ${currentUser.phone}`;
    updateTicketDisplay();
    document.getElementById('loginModal').style.display = 'none';
}

function updateTicketDisplay() {
    if (!currentUser) return;
    const tickets = currentUser.tickets || 0;
    document.getElementById('remainChances').innerHTML = `🎫 券: ${tickets}`;
    document.getElementById('drawBtn').disabled = tickets <= 0;
    document.getElementById('resultArea').innerHTML = tickets <= 0 ? '🎫 暂无抽奖券，联系管理员领取' : '✨ 点击抽奖 ✨';
}

// ==================== 抽奖相关 ====================
async function performDraw() {
    if (!currentUser) { document.getElementById('loginModal').style.display = 'flex'; return; }
    if (currentUser.tickets <= 0) { showToast('抽奖券不足'); return; }
    if (isRolling) return;
    
    const result = await apiRequest('/api/draw', 'POST', { phone: currentUser.phone });
    if (!result.success) { showToast(result.message || '抽奖失败'); return; }
    
    const finalPrize = result.prize;
    currentUser.tickets = result.tickets_left;
    
    startRollingAnimation(prizeList, finalPrize, () => {
        updateTicketDisplay();
        document.getElementById('resultArea').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;gap:10px;"><div style="font-size:2rem;">${finalPrize.icon}</div><div style="font-weight:bold;">✨ ${escapeHtml(finalPrize.name)} ✨</div></div>`;
        showToast(`恭喜获得：${finalPrize.name}！剩余券:${currentUser.tickets}`);
        document.getElementById('winIcon').innerText = finalPrize.icon;
        document.getElementById('winPrizeName').innerText = finalPrize.name;
        document.getElementById('winModal').style.display = 'flex';
    });
}

function startRollingAnimation(prizes, finalPrize, callback) {
    isRolling = true;
    const container = document.getElementById('rollingContainer');
    container.classList.add('rolling-active');
    document.getElementById('drawBtn').disabled = true;
    
    const startTime = Date.now();
    const duration = 2200;
    
    rollInterval = setInterval(() => {
        if (Date.now() - startTime < duration) {
            const rp = prizes[Math.floor(Math.random() * prizes.length)];
            document.getElementById('rollingIcon').innerText = rp.iconValue;
            document.getElementById('rollingName').innerText = rp.name;
        } else {
            clearInterval(rollInterval);
            container.classList.remove('rolling-active');
            document.getElementById('rollingIcon').innerText = finalPrize.icon;
            document.getElementById('rollingName').innerText = finalPrize.name;
            isRolling = false;
            callback && callback();
        }
    }, 70);
}

// ==================== 奖品管理 ====================
async function getPrizes() {
    const result = await apiRequest('/api/prizes');
    if (result.success && result.prizes) {
        prizeList = result.prizes.map(p => ({ name: p.name, weight: p.weight, iconValue: p.icon }));
        return true;
    }
    return false;
}

async function updatePrizes() {
    const apiPrizes = prizeList.map(p => ({ name: p.name, weight: p.weight, icon: p.iconValue }));
    return await apiRequest('/api/prizes', 'POST', { prizes: apiPrizes });
}

function renderPrizeTable() {
    const tbody = document.getElementById('prizeTableBody');
    tbody.innerHTML = '';
    prizeList.forEach((prize, idx) => {
        const row = tbody.insertRow();
        row.innerHTML = `
            <td><div style="font-size:1.5rem;cursor:pointer;" data-idx="${idx}">${prize.iconValue}</div></td>
            <td><input type="text" value="${escapeHtml(prize.name)}" data-idx="${idx}" class="prize-name" style="width:100px;border-radius:20px;padding:4px;"></td>
            <td><input type="number" value="${prize.weight}" data-idx="${idx}" class="prize-weight" style="width:50px;border-radius:20px;padding:4px;"></td>
            <td><button class="remove-btn" data-idx="${idx}" style="padding:4px 8px;background:#ff8787;color:white;border:none;border-radius:20px;cursor:pointer;">✖</button></td>
        `;
    });
    
    tbody.querySelectorAll('.prize-name').forEach(inp => inp.onchange = e => { prizeList[inp.dataset.idx].name = inp.value; updatePrizes(); updateMarquee(); });
    tbody.querySelectorAll('.prize-weight').forEach(inp => inp.onchange = e => { prizeList[inp.dataset.idx].weight = Math.max(0, parseInt(inp.value) || 0); updatePrizes(); });
    tbody.querySelectorAll('.remove-btn').forEach(btn => btn.onclick = e => { if (prizeList.length > 1) { prizeList.splice(btn.dataset.idx, 1); renderPrizeTable(); updateMarquee(); updatePrizes(); showToast('已删除'); } else showToast('至少保留一个'); });
    tbody.querySelectorAll('[data-idx]').forEach(el => el.onclick = e => { if (el.classList.contains('prize-name') || el.classList.contains('prize-weight') || el.classList.contains('remove-btn')) return; openIconSelector(parseInt(el.dataset.idx)); });
}

function openIconSelector(idx) {
    activeEditIdx = idx;
    const grid = document.getElementById('iconGrid');
    grid.innerHTML = '';
    ICON_LIBRARY.forEach(icon => {
        const div = document.createElement('div');
        div.style.cssText = 'font-size:1.8rem;cursor:pointer;padding:6px;border-radius:12px;background:#f1f4ff;text-align:center;';
        div.innerText = icon;
        div.onclick = () => { prizeList[activeEditIdx].iconValue = icon; renderPrizeTable(); updateMarquee(); updatePrizes(); document.getElementById('iconModal').style.display = 'none'; showToast('图标已更新'); };
        grid.appendChild(div);
    });
    document.getElementById('iconModal').style.display = 'flex';
}

function updateMarquee() {
    const track = document.getElementById('marqueeTrack');
    track.innerHTML = '';
    [...prizeList, ...prizeList].forEach(p => {
        const div = document.createElement('div');
        div.className = 'marquee-item';
        div.innerHTML = `<div style="font-size:1.5rem;">${p.iconValue}</div><span>${escapeHtml(p.name.slice(0,6))}</span>`;
        track.appendChild(div);
    });
}

// ==================== 管理功能 ====================
async function searchUser() {
    const phone = document.getElementById('searchPhone').value.trim();
    if (!phone) return;
    currentSearchPhone = phone;
    const result = await apiRequest('/api/user/' + phone);
    const info = document.getElementById('userPhoneInfo');
    if (result.success && result.user) {
        info.innerHTML = `<strong>📱 ${phone}</strong><br>🎫 券: ${result.user.tickets || 0}`;
    } else {
        info.innerHTML = `<strong>📱 ${phone}</strong><br>❌ 未注册，发放券将自动创建`;
    }
    info.style.display = 'block';
}

async function addTicketsToUser() {
    if (!currentSearchPhone) { showToast('请先查询'); return; }
    const amount = parseInt(document.getElementById('addChanceAmount').value) || 1;
    const result = await apiRequest('/api/tickets/add', 'POST', { phone: currentSearchPhone, count: amount });
    if (result.success) { showToast(`已发放 ${amount} 张券`); searchUser(); }
    else showToast(result.message || '发放失败');
}

async function batchAddTickets() {
    if (!confirm('为所有用户+1券?')) return;
    const result = await apiRequest('/api/tickets/batch', 'POST', { count: 1 });
    if (result.success) showToast(`已为 ${result.user_count} 位用户+1券`);
    else showToast(result.message || '失败');
}

async function refreshStats() {
    const result = await apiRequest('/api/stats');
    const el = document.getElementById('statsDisplay');
    if (result.success) {
        const s = result.stats;
        el.innerHTML = `👥 用户: ${s.total_users} | 🎰 抽奖: ${s.total_draws} | 🎫 总券: ${s.total_tickets}`;
    } else el.innerHTML = '获取统计失败';
}

async function exportExcel() {
    const result = await apiRequest('/api/export');
    if (!result.success) { showToast('导出失败'); return; }
    
    const data = [];
    const users = result.data.users || {};
    for (const phone in users) {
        const u = users[phone];
        data.push({ 手机号: phone, 抽奖券: u.tickets || 0, 注册时间: u.created_at || '' });
    }
    
    if (!data.length) { showToast('无数据'); return; }
    
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '用户数据');
    XLSX.writeFile(wb, `盲盒数据_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast(`导出 ${data.length} 条记录`);
}

// ==================== 配置保存 ====================
function saveConfiguration() {
    const link = window.location.href.split('?')[0];
    currentShareLink = link;
    document.getElementById('shareLinkDisplay').innerHTML = `<i class="fas fa-link"></i> ${link.substring(0,50)}...`;
    document.getElementById('shareLinkDisplay').dataset.link = link;
    generateRealQRCode(link, 'qrcode');
    updatePrizes();
    showToast('✅ 配置已保存，二维码已生成！');
}

function generateRealQRCode(text, elementId) {
    const container = document.getElementById(elementId);
    container.innerHTML = '';
    try {
        new QRCode(elementId, { text, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.H });
    } catch (e) { container.innerHTML = '二维码生成失败'; }
}

function copyShareLink() {
    const link = currentShareLink || document.getElementById('shareLinkDisplay').dataset.link;
    if (link) { navigator.clipboard.writeText(link); showToast('链接已复制'); }
    else showToast('请先保存配置');
}

function downloadQRCode() {
    const img = document.querySelector('#qrcode img') || document.querySelector('#qrcode canvas');
    if (img) { const a = document.createElement('a'); a.download = 'qrcode.png'; a.href = img.src; a.click(); showToast('已保存'); }
    else showToast('二维码未生成');
}

// ==================== 初始化 ====================
async function init() {
    await checkApiStatus();
    
    const urlParams = new URLSearchParams(window.location.search);
    const userParam = urlParams.get('user');
    
    if (userParam) {
        isUserMode = true;
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('lotteryPanel').style.display = 'flex';
        
        await getPrizes();
        updateMarquee();
        
        const saved = sessionStorage.getItem('session');
        if (saved) { currentUser = JSON.parse(saved); updateUIAfterLogin(); }
        else document.getElementById('loginModal').style.display = 'flex';
        
        document.getElementById('submitLoginBtn').onclick = async () => await userLogin(document.getElementById('loginPhone').value.trim());
        document.getElementById('drawBtn').onclick = performDraw;
    } else {
        isUserMode = false;
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('lotteryPanel').style.display = 'none';
        
        await getPrizes();
        renderPrizeTable();
        updateMarquee();
        refreshStats();
        
        document.getElementById('saveConfigBtn').onclick = saveConfiguration;
        document.getElementById('resetDefaultBtn').onclick = async () => { prizeList = JSON.parse(JSON.stringify(DEFAULT_PRIZES)); renderPrizeTable(); updateMarquee(); await updatePrizes(); showToast('已重置'); };
        document.getElementById('addPrizeBtn').onclick = () => { prizeList.push({ name: "新奖品", weight: 10, iconValue: "🎁" }); renderPrizeTable(); updateMarquee(); };
        document.getElementById('batchAddTicketsBtn').onclick = batchAddTickets;
        document.getElementById('searchUserBtn').onclick = searchUser;
        document.getElementById('addUserChanceBtn').onclick = addTicketsToUser;
        document.getElementById('resetUserChanceBtn').onclick = async () => { if (currentSearchPhone) { await apiRequest('/api/tickets/add', 'POST', { phone: currentSearchPhone, count: -9999 }); searchUser(); showToast('已清空'); } };
        document.getElementById('exportExcelBtn').onclick = exportExcel;
        document.getElementById('refreshStatsBtn').onclick = refreshStats;
        document.getElementById('copyLinkBtn').onclick = copyShareLink;
        document.getElementById('downloadQrBtn').onclick = downloadQRCode;
    }
    
    document.getElementById('closeWinModalBtn').onclick = () => document.getElementById('winModal').style.display = 'none';
    document.getElementById('closeIconModal').onclick = () => document.getElementById('iconModal').style.display = 'none';
}

init();
</script>
